name: Deploy Office Add-in to GitHub Pages

# Compila el projecte modern (Office.js) i en publica el dist/ a GitHub Pages.
# Resultat: https://clickame.github.io/outlook_plugin/

on:
  push:
    branches: [main]
    paths:
      - "outlook-modern-officejs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola publicació alhora; no cancel·la una en curs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: outlook-modern-officejs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: outlook-modern-officejs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outlook-modern-officejs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
